<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoArena Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .status.healthy {
            background: #10b981;
        }
        
        .status.warning {
            background: #f59e0b;
        }
        
        .status.error {
            background: #ef4444;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .card h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #e0e7ff;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #c7d2fe;
            font-size: 0.9rem;
        }
        
        .metric-value {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .positive {
            color: #10b981;
        }
        
        .negative {
            color: #ef4444;
        }
        
        .agent-list {
            display: grid;
            gap: 10px;
        }
        
        .agent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .agent-name {
            font-weight: bold;
        }
        
        .agent-pnl {
            font-size: 1.1rem;
        }
        
        .refresh-info {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #e0e7ff;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏟️ CryptoArena Dashboard</h1>
            <div class="status healthy" id="system-status">SYSTEM HEALTHY</div>
        </header>
        
        <div id="dashboard-content" class="loading">
            Loading arena data
        </div>
        
        <div class="refresh-info">
            🔄 Auto-refresh every 30 seconds | Last update: <span id="last-update">--:--:--</span>
        </div>
    </div>
    
    <script>
        // API endpoint - adjust based on your server configuration
        const API_URL = 'http://localhost:8000/api';
        
        // Update last update timestamp
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString();
        }
        
        // Format currency
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }
        
        // Format percentage
        function formatPercent(value) {
            const sign = value >= 0 ? '+' : '';
            return `${sign}${value.toFixed(2)}%`;
        }
        
        // Fetch and display dashboard data
        async function fetchDashboard() {
            try {
                // In production, this would fetch from actual API
                // For MVP, we'll use mock data
                const data = getMockData();
                
                renderDashboard(data);
                updateTimestamp();
                
                // Update system status
                const statusEl = document.getElementById('system-status');
                statusEl.textContent = 'SYSTEM HEALTHY';
                statusEl.className = 'status healthy';
                
            } catch (error) {
                console.error('Failed to fetch dashboard:', error);
                document.getElementById('dashboard-content').innerHTML = `
                    <div class="card">
                        <h3>❌ Error Loading Data</h3>
                        <p>Could not connect to CryptoArena API. Make sure the server is running.</p>
                        <p style="margin-top: 10px; font-size: 0.9rem; color: #c7d2fe;">
                            Start server: <code>python scripts/monitor.py</code>
                        </p>
                    </div>
                `;
                
                const statusEl = document.getElementById('system-status');
                statusEl.textContent = 'CONNECTION ERROR';
                statusEl.className = 'status error';
            }
        }
        
        // Render dashboard with data
        function renderDashboard(data) {
            const content = document.getElementById('dashboard-content');
            
            content.innerHTML = `
                <div class="grid">
                    <!-- Portfolio Overview -->
                    <div class="card">
                        <h3>💼 Portfolio Overview</h3>
                        <div class="metric">
                            <span class="metric-label">Total Value</span>
                            <span class="metric-value">${formatCurrency(data.portfolio.total)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">24h P&L</span>
                            <span class="metric-value ${data.portfolio.pnl_24h >= 0 ? 'positive' : 'negative'}">
                                ${formatPercent(data.portfolio.pnl_24h)}
                            </span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Total P&L</span>
                            <span class="metric-value ${data.portfolio.total_pnl >= 0 ? 'positive' : 'negative'}">
                                ${formatPercent(data.portfolio.total_pnl)}
                            </span>
                        </div>
                    </div>
                    
                    <!-- Game Status -->
                    <div class="card">
                        <h3>🎮 Game Status</h3>
                        <div class="metric">
                            <span class="metric-label">Cycle</span>
                            <span class="metric-value">#${data.game.cycle}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Mode</span>
                            <span class="metric-value">${data.game.mode.toUpperCase()}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Market Regime</span>
                            <span class="metric-value">${data.game.regime}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Active Trades</span>
                            <span class="metric-value">${data.game.active_trades}</span>
                        </div>
                    </div>
                    
                    <!-- Market Prices -->
                    <div class="card">
                        <h3>📈 Live Prices</h3>
                        <div class="metric">
                            <span class="metric-label">BTC</span>
                            <span class="metric-value">${formatCurrency(data.prices.BTC)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">ETH</span>
                            <span class="metric-value">${formatCurrency(data.prices.ETH)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">SOL</span>
                            <span class="metric-value">${formatCurrency(data.prices.SOL)}</span>
                        </div>
                    </div>
                </div>
                
                <!-- Agent Performance -->
                <div class="card">
                    <h3>🤖 Agent Performance</h3>
                    <div class="agent-list">
                        ${data.agents.map(agent => `
                            <div class="agent-item">
                                <span class="agent-name">${agent.id} - ${agent.name}</span>
                                <span class="agent-pnl ${agent.pnl >= 0 ? 'positive' : 'negative'}">
                                    ${formatPercent(agent.pnl)}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        // Mock data for development
        function getMockData() {
            return {
                portfolio: {
                    total: 103450,
                    pnl_24h: 2.3,
                    total_pnl: 3.45
                },
                game: {
                    cycle: 247,
                    mode: 'paper',
                    regime: 'Neutral',
                    active_trades: 12
                },
                prices: {
                    BTC: 89234,
                    ETH: 3456,
                    SOL: 178
                },
                agents: [
                    { id: 'A1', name: 'BTC Trend', pnl: 5.2 },
                    { id: 'A2', name: 'ETH Swing', pnl: 3.1 },
                    { id: 'A3', name: 'SOL Short', pnl: -1.2 },
                    { id: 'A4', name: 'Meme Sniper', pnl: 8.7 },
                    { id: 'A5', name: 'DeFi Basis', pnl: 1.9 },
                    { id: 'A6', name: 'Prediction', pnl: 2.4 },
                    { id: 'A7', name: 'Index', pnl: 3.8 },
                    { id: 'A8', name: 'Chaos', pnl: -0.5 }
                ]
            };
        }
        
        // Initial load
        fetchDashboard();
        
        // Auto-refresh every 30 seconds
        setInterval(fetchDashboard, 30000);
    </script>
</body>
</html>
